name: Actualizar partidos con API-Football

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tokol-data-update
  cancel-in-progress: false

jobs:
  update-matches:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Consultar API-Football y actualizar data.json
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_LEAGUE_ID: ${{ vars.API_FOOTBALL_LEAGUE_ID }}
          API_FOOTBALL_SEASON: ${{ vars.API_FOOTBALL_SEASON }}
        run: python scripts/update_data.py

      - name: Guardar cambios
        run: |
          if git diff --quiet -- data.json; then
            echo "No hubo cambios en data.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Actualizar partidos automáticamente"
          git push
