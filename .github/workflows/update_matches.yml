name: Actualizar marcadores con The Odds API

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-matches:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Actualizar marcadores y partidos
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          THE_ODDS_SPORT_KEY: ${{ vars.THE_ODDS_SPORT_KEY }}
        run: python scripts/update_data.py

      - name: Guardar cambios
        run: |
          if git diff --quiet -- data.json; then
            echo "No hubo cambios en data.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Actualizar marcadores automáticamente"
          git push
